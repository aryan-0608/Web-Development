<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="with=device-width,initial-scale=1.0">
    <meta http-equiv="x-UA-compatible" content="ie=edge">
    <title>Box shadow and text shadow</title>
<head>
    <style>
        .container{
            display: flex;
        }
        .card{
            padding: 23px 12px;
            /* border: 2px solid black; */
            margin: 23px 12px;
            background-color: lightgray;
            /* box-shadow: offset-x offset-y colour;
            box-shadow: offset-x offset-y blur-radius colour;
            box-shadow: offset-x offset-y blur-radius spread-radius colour; */



            /* box-shadow: 10px 13px red; */
            /* box-shadow: -10px -13px blue; */
            /* box-shadow: 7px 5px 10px green; */
            /* box-shadow: 7px 5px 10px 34px green; */
            box-shadow: inset 3px 55px green;

            box-shadow: -7px -5px 10px 34px rgba(71,172,172,0.5); 

            box-shadow:3px 5px green, 4px 6px red;
        }
        .card h2{
            text-shadow: 3px 5px 10px red;
        }



    </style>
    <body>
        <div class="container">
            <div class="card" id ="card1">
                <h2>This is c++ Course</h2>
                <p> I have started C++ course which does not mean than will stop thos course.This is the first card.</p>
        </div>
        <div class="card" id ="card2">
            <h2>This is HTML Course</h2>
            <p>This is the second HTML course in completed.</p>
        </div>
        <div class="card" id ="card3">
            <h2>Card 3</h2>
            <p>This is the third card.</p>
        </div>
    </body>
</html>
