<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Math object</title>
</head>
<body>
    <div class="container">
        This is math object tutorial
    </div>
    <script>
        // ?? priting math object
        let m = Math;
        console.log(m);
        console.log(Math.PI);
        console.log(Math.E);
        console.log(Math.LN2);
        console.log(Math.SQRT2);
        console.log(Math.LOG2E);

        // printing the functions from math object
        let a = 4.567;
        let b = 58;

        console.log("The value of a is ", a);
        console.log("The value of b is ", b);

        console.log("The value of a  and b rounded is", Math.round(a), Math.round(b));
        
        console.log("3 raised to the power of 2 is ", Math.pow(3,2))
        console.log("2 raised to the power of 3 is ", Math.pow(2,3))

    console.log("square root of 36 is ",Math.sqrt(36));
    console.log("square root of 49 is ",Math.sqrt(49));

    // ceil and floor
    console.log("5.8 rounded up to nearest interger is ", Math.ceil(5.8));
    console.log("5.2 rounded down to nearest interger is ", Math.floor(5.2));

    // ??Abs function
    console.log("Absolute value of -5.66 is ", Math.abs(-5.66));
    console.log("Absolute value of 52 is ", Math.abs(52));

    // Trinometric functuion
    console.log("The value of  sin(pi) is ", Math.sin(Math.PI/2));
    console.log("The value of  cos(pi) is ", Math.cos(Math.PI));
    console.log("The value of  tan(pi) is ", Math.tan(Math.PI));


    // Min and max function
    console.log("minimum of 4, 5, 6, 7 is ", Math.min(4,5,6,7));
    console.log("maximum of 14, 15, 16, 17 is ", Math.max(14,15,16,17));
    

    </script>
        


    </body>
    </html>
