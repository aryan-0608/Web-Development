<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Transitions</title>

<style>
body{
    background-color: lightgray;
}

#box{
    display: flex;
    height: 200px;
    width: 200px;
    background-color: red;
    justify-content: center;
    align-items: center;
    transition: all 2s ease-in-out 0.5s;
}

#box:hover{
    background-color: green;
    height: 300px;
    width: 300px;
    border-radius: 100px;
    font-size: 30px;
}
</style>
</head>

<body>
<h3>This is CSS Transitions</h3>

<div class="container">
    <div id="box">
        This is a box
    </div>
</div>

</body>
</html>
