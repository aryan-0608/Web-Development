<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Transform</title >
<style>
    *{
        margin : 0px;;
        padding :0px;
    }
    .container{
        background-color: lightgray;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        

    }
    .box{
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: red;
        border: 2px solid black;
        border-radius: 10px;
        height:400px;
        width:400px;
        /* transform: rotate(45deg); */
        transition: all 2s ease-in-out;
    }
    .box:hover{
        /* transform: rotate(360deg); */
         /* transform: scale(1.5);  */
            /* transform: skew(2); */
            transform: translate(100px, 100px);
    }

     
</style>
</head>
<body>
    <div class="container">
        <div class="box">
            This is a box
        </div>
    </div>
</body>
</html>
