<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="with=device-width,initial-scale=1.0">
    <meta http-equiv="x-UA-compatible" content="ie=edge">
    <title>Css varible/ custom properties</title>
    <style>
        :root{
            --primary-color: red;
            --danger-color: blue;
            --maxw: 333px;
        }

        .box{
            --box-color: grey;
            width: 200px;
            height: 200px;
            background-color: var(--primary-color);
            border: 2px solid black;
            box-shadow:  3px 3px var(--danger-color);
            margin: 2px 9px;
        }
        .container{
            max-width: var(--maxw);
            margin: auto;
            background-color: var(--danger-color);
            --box-color: lightblue;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--box-color);
        }
    </style>
<head>
<body>
    <div class="container">
        <div class="box" ></div>
        <div class="box" ></div>
        <div class="box" ></div>


</body>
</html>
